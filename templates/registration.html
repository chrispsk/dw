{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h1 class="mb-4">Create Account</h1>

            {% include "alerts.html" %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    {{ user_form.as_p }}
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Register
                </button>
            </form>

            <p class="mt-3">
                Already have an account?
                <a href="{% url 'accounts:login' %}">Login here</a>.
            </p>
        </div>
    </div>
</div>
{% endblock %}
