{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Severity Overview</h1>
    <p class="text-muted">
        This chart shows the number of vulnerabilities grouped by severity level.
    </p>

    <div id="severity-overview-chart" style="width: 100%; height: 400px;"></div>
</div>
{% endblock %}

{% block highcharts %}
<script>
    const severityLevels = JSON.parse('{{ level|escapejs }}');
    const vulnerabilityCounts = JSON.parse('{{ how|escapejs }}');

    Highcharts.chart('severity-overview-chart', {
        chart: {
            type: 'bar'
        },
        title: {
            text: 'Vulnerabilities by Severity'
        },
        subtitle: {
            text: 'Source: Vulnerability dataset'
        },
        xAxis: {
            categories: severityLevels,
            title: {
                text: 'Severity'
            }
        },
        yAxis: {
            min: 0,
            title: {
                text: 'Number of vulnerabilities',
                align: 'high'
            },
            labels: {
                overflow: 'justify'
            }
        },
        tooltip: {
            valueSuffix: ' vulnerabilities'
        },
        plotOptions: {
            bar: {
                dataLabels: {
                    enabled: true
                }
            }
        },
        credits: {
            enabled: false
        },
        series: [{
            name: 'Vulnerabilities',
            data: vulnerabilityCounts
        }]
    });
</script>
{% endblock %}
