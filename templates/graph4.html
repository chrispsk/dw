{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Dynamic Charts</h1>
    <p class="text-muted">
        This page loads vulnerability chart data dynamically using AJAX.
    </p>

    <div class="row">
        <div class="col-md-6">
            <h4>Severity Overview</h4>
            <div id="severity-ajax-chart" style="width: 100%; height: 400px;"></div>
        </div>

        <div class="col-md-6">
            <h4>Last 4 Weeks</h4>
            <div id="weeks-ajax-chart" style="width: 100%; height: 400px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block highcharts %}
<script>
    function renderBarChart(containerId, categories, values, title) {
        Highcharts.chart(containerId, {
            chart: {
                type: 'bar'
            },
            title: {
                text: title
            },
            subtitle: {
                text: 'Source: Vulnerability dataset'
            },
            xAxis: {
                categories: categories,
                title: {
                    text: 'Category'
                }
            },
            yAxis: {
                min: 0,
                title: {
                    text: 'Number of vulnerabilities',
                    align: 'high'
                }
            },
            tooltip: {
                valueSuffix: ' vulnerabilities'
            },
            plotOptions: {
                bar: {
                    dataLabels: {
                        enabled: true
                    }
                }
            },
            credits: {
                enabled: false
            },
            series: [{
                name: 'Vulnerabilities',
                data: values
            }]
        });
    }

    $(document).ready(function () {
        const ajaxUrl = "{% url 'back:adajax' %}";

        $.ajax({
            url: ajaxUrl,
            method: "GET",
            data: {
                type: "severity total"
            },
            success: function (responseData) {
                renderBarChart(
                    "severity-ajax-chart",
                    responseData.level,
                    responseData.how,
                    "Vulnerabilities by Severity"
                );
            },
            error: function () {
                alert("Unable to load severity chart data.");
            }
        });

        $.ajax({
            url: ajaxUrl,
            method: "GET",
            data: {
                type: "4 weeks"
            },
            success: function (responseData) {
                renderBarChart(
                    "weeks-ajax-chart",
                    responseData.level,
                    responseData.how,
                    "Vulnerabilities Over the Last 4 Weeks"
                );
            },
            error: function () {
                alert("Unable to load weekly chart data.");
            }
        });
    });
</script>
{% endblock %}
