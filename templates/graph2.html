{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Severity Timeline</h1>
    <p class="text-muted">
        This chart shows how vulnerability severity levels are distributed across publication dates.
    </p>

    <div id="severity-timeline-chart" style="width: 100%; height: 400px;"></div>
</div>
{% endblock %}

{% block highcharts %}
<script>
    const publishDates = JSON.parse('{{ dat|escapejs }}');
    const criticalCounts = JSON.parse('{{ cri|escapejs }}').map(Number);
    const highCounts = JSON.parse('{{ hi|escapejs }}').map(Number);
    const mediumCounts = JSON.parse('{{ me|escapejs }}').map(Number);
    const lowCounts = JSON.parse('{{ lo|escapejs }}').map(Number);

    Highcharts.chart('severity-timeline-chart', {
        chart: {
            type: 'column'
        },
        title: {
            text: 'Vulnerability Severity by Date'
        },
        subtitle: {
            text: 'Source: Vulnerability dataset'
        },
        xAxis: {
            categories: publishDates,
            crosshair: true,
            title: {
                text: 'Publication date'
            }
        },
        yAxis: {
            min: 0,
            title: {
                text: 'Number of vulnerabilities'
            }
        },
        tooltip: {
            shared: true,
            useHTML: true,
            headerFormat: '<span style="font-size:10px">{point.key}</span><table>',
            pointFormat: '<tr><td style="color:{series.color};padding:0">{series.name}: </td>' +
                '<td style="padding:0"><b>{point.y}</b></td></tr>',
            footerFormat: '</table>'
        },
        plotOptions: {
            column: {
                pointPadding: 0.2,
                borderWidth: 0
            }
        },
        credits: {
            enabled: false
        },
        series: [
            {
                name: 'Critical',
                data: criticalCounts
            },
            {
                name: 'High',
                data: highCounts
            },
            {
                name: 'Medium',
                data: mediumCounts
            },
            {
                name: 'Low',
                data: lowCounts
            }
        ]
    });
</script>
{% endblock %}
