{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Daily Vulnerability Trends</h1>
    <p class="text-muted">
        This chart shows the total number of vulnerabilities published on each date.
    </p>

    <div id="daily-trends-chart" style="width: 100%; height: 400px;"></div>
</div>
{% endblock %}

{% block highcharts %}
<script>
    const vulnerabilityDataByDate = JSON.parse('{{ da|escapejs }}');

    Highcharts.chart('daily-trends-chart', {
        chart: {
            type: 'column'
        },
        title: {
            text: 'Vulnerabilities Published per Day'
        },
        subtitle: {
            text: 'Source: Vulnerability dataset'
        },
        xAxis: {
            type: 'category',
            title: {
                text: 'Publication date'
            },
            labels: {
                rotation: -45,
                style: {
                    fontSize: '13px',
                    fontFamily: 'Verdana, sans-serif'
                }
            }
        },
        yAxis: {
            min: 0,
            title: {
                text: 'Number of vulnerabilities'
            }
        },
        legend: {
            enabled: false
        },
        tooltip: {
            pointFormat: '<b>{point.y}</b> vulnerabilities published'
        },
        credits: {
            enabled: false
        },
        series: [{
            name: 'Vulnerabilities',
            data: vulnerabilityDataByDate,
            dataLabels: {
                enabled: true,
                rotation: -90,
                align: 'right',
                format: '{point.y}',
                y: 10,
                style: {
                    fontSize: '13px',
                    fontFamily: 'Verdana, sans-serif'
                }
            }
        }]
    });
</script>
{% endblock %}
